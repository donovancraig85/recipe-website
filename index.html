<!DOCTYPE html>
<html>
<head>
  <title>My Recipes</title>
  <link rel="stylesheet" href="style.css">

  <!-- PDF support -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";
  </script>

  <!-- DOCX support -->
  <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

  <!-- OCR for images -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <h3>Categories</h3>
      <ul id="category-list">
        <li data-cat="Breakfast">Breakfast</li>
        <li data-cat="Dinner">Dinner</li>
        <li data-cat="Beverages">Beverages</li>
        <li data-cat="Soups/Stews">Soups/Stews</li>
        <li data-cat="Salads">Salads</li>
        <li data-cat="Side Dishes">Side Dishes</li>
        <li data-cat="Condiments/Sauces">Condiments/Sauces</li>
        <li data-cat="Seasonings">Seasonings</li>
        <li data-cat="Desserts">Desserts</li>
        <li data-cat="Breads">Breads</li>
        <li data-cat="All Recipes">All Recipes</li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

      <h1>Recipes</h1>

      <!-- Search -->
      <input type="text" id="search" placeholder="Search recipes...">
      <button id="search-btn">Search</button>

      <!-- Live search dropdown -->
      <div id="search-results" class="search-dropdown"></div>

      <!-- Upload -->
      <h3>Upload Recipe File</h3>
      <input type="text" id="upload-name" placeholder="Enter recipe name">

      <select id="upload-category">
        <option value="">Select Category</option>
        <option>Breakfast</option>
        <option>Dinner</option>
        <option>Beverages</option>
        <option>Soups/Stews</option>
        <option>Salads</option>
        <option>Side Dishes</option>
        <option>Condiments/Sauces</option>
        <option>Seasonings</option>
        <option>Desserts</option>
        <option>Breads</option>
      </select>

      <input type="file" id="recipe-file">
      <button id="upload-btn">Upload Recipe</button>

    </main>

  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <!-- Firebase Config -->
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD-ZVROybS5c3O6kJhe8LVcXNZ0KbYTmvg",
      authDomain: "recipes-83727.firebaseapp.com",
      projectId: "recipes-83727",
      storageBucket: "recipes-83727.appspot.com",
      messagingSenderId: "97445031584",
      appId: "1:97445031584:web:a463b119a272531f51a3c5",
      measurementId: "G-4LERX7EWB7"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
  </script>

  <!-- App Logic -->
  <script src="app.js"></script>

</body>
</html>
