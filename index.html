<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Recipes</title>
  <link rel="stylesheet" href="style.css">

  <!-- DOCX support -->
  <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
</head>

<body>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <h3>Categories</h3>
      <ul id="category-list">
        <li><a href="category.html?cat=Breakfast">Breakfast</a></li>
        <li><a href="category.html?cat=Dinner">Dinner</a></li>
        <li><a href="category.html?cat=Beverages">Beverages</a></li>
        <li><a href="category.html?cat=Soups and Stews">Soups and Stews</a></li>
        <li><a href="category.html?cat=Salads">Salads</a></li>
        <li><a href="category.html?cat=Side Dishes">Side Dishes</a></li>
        <li><a href="category.html?cat=Condiments and Sauces">Condiments and Sauces</a></li>
        <li><a href="category.html?cat=Seasonings">Seasonings</a></li>
        <li><a href="category.html?cat=Desserts">Desserts</a></li>
        <li><a href="category.html?cat=Breads">Breads</a></li>
        <li><a href="category.html?cat=Hors D'oeuvres">Hors D'oeuvres</a></li>
        <li><a href="category.html?cat=All Recipes">All Recipes</a></li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

      <h1>Recipes</h1>

      <!-- Search -->
      <input type="text" id="search" placeholder="Search recipes...">
      <button id="search-btn">Search</button>

      <!-- Live search dropdown -->
      <div id="search-results" class="search-dropdown"></div>

      <!-- Upload -->
      <h3>Upload Recipe File</h3>

      <input type="text" id="upload-name" placeholder="Enter recipe name">

      <select id="upload-category">
        <option value="">Select Category</option>
        <option>Breakfast</option>
        <option>Dinner</option>
        <option>Beverages</option>
        <option>Soups and Stews</option>
        <option>Salads</option>
        <option>Side Dishes</option>
        <option>Condiments and Sauces</option>
        <option>Seasonings</option>
        <option>Desserts</option>
        <option>Breads</option>
        <option>Hors D'oeuvres</option>
      </select>

      <input type="file" id="recipe-file">
      <button id="upload-btn">Upload Recipe</button>

      <!-- Recipe list -->
      <div id="recipe-list"></div>

    </main>

  </div>

<!-- PDF.js v3.x (must load BEFORE app.js, but AFTER body) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="firebase-init.js"></script>
<script src="app-v2.js"></script>

</body>
</html>
